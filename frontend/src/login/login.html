<div class="login-wrapper">
  <div class="logo-container">
    <img src="LOGO.png" class="logo" alt="Logo" />
  </div>

  <div class="form-card">
    <div class="form-tabs">
      <h1 class="tab-btn active">INICIAR SESION</h1>
      <h1 class="tab-btn" routerLink ="/registro">REGISTRARSE</h1>
    </div>

    <form (submit)="$event.preventDefault(); enviarLogin()">
      <div class="form-group">
        <h2>CORREO ELECTRONICO</h2>
        <input type="email" [(ngModel)]="username" name="username" required />
      </div>

      <div class="form-group">
        <h2>CONTRASEÑA</h2>
        <div class="password-wrapper">
          <input
            [type]="showPassword ? 'text' : 'password'"
            [(ngModel)]="password"
            name="password"
            required
          />
          <button type="button" class="toggle-password" (click)="showPassword = !showPassword">
            <i [class]="showPassword ? 'bi bi-eye-slash' : 'bi bi-eye'"></i>
          </button>
        </div>
      </div>

      <div class="form-options">
        <label class="checkbox-container">
          <input type="checkbox" [(ngModel)]="recordar" name="recordar" />
          <span class="checkmark"></span>
          <span class="texto-checkbox">Recordarme</span>
        </label>
        <a href="#" class="forgot-link">¿Olvidaste la contraseña?</a>
      </div>

      <div class="text-center">
        <button type="submit" class="btn-acceder">ACCEDER</button>
      </div>
    </form>
  </div>
</div>
